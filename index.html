function isSU(rn,day){return(STRUCT[rn]||[]).indexOf(day)>=0;}

function buildExport(as,pv,cc){var lines=[];DAYS.forEach(function(day){SHIFTS.forEach(function(shift){if(!cOpen(cc,day,shift))return;var slot=as[day][shift];var hasContent=false;RNS.forEach(function(rn){if(slot.rn[rn]&&slot.rn[rn]!=="Off"&&slot.rn[rn]!=="Time Off")hasContent=true;});MEAS.forEach(function(mea){if(slot.mea[mea]&&slot.mea[mea].role&&slot.mea[mea].role!=="Time Off"&&slot.mea[mea].role!=="Unassigned")hasContent=true;});if(!hasContent)return;lines.push(day+" "+shift);RNS.forEach(function(rn){var role=slot.rn[rn];if(!role||role==="Off"||role==="Time Off")return;lines.push(rn+" - "+role);});lines.push("");MEAS.forEach(function(mea){var md=slot.mea[mea];if(!md||!md.role||md.role==="Time Off"||md.role==="Unassigned")return;if(md.role==="Provider MEA"&&md.provider){lines.push(mea+" - provider: "+md.provider);}else{lines.push(mea+" - "+md.role.toLowerCase());}});lines.push("");});});return lines.join("\n").trim();}
function generate(ps,hist,to,cc){

var trc=p.filter(function(rn){return amR(rn)!=="Triage";}).sort(function(a,b){return((rrh[a].Triage||0)+rwr[a].Triage*5)-((rrh[b].Triage||0)+rwr[b].Triage*5);});
if(trc.length>0){aRN(slot,trc[0],"Triage",day);p=p.filter(function(r){return r!==trc[0];});}
var clc=p.filter(function(rn){return amR(rn)!=="Clinic";}).sort(function(a,b){return((rrh[a].Clinic||0)+rwr[a].Clinic*3)-((rrh[b].Clinic||0)+rwr[b].Clinic*3);}).slice(0,Math.min(2,p.length));

var tf=RNS.some(function(rn){return slot.rn[rn]==="Triage";});var cf=RNS.some(function(rn){return slot.rn[rn]==="Clinic";});var bf=!hasBP||RNS.some(function(rn){return slot.rn[rn]==="BP Clinic";});

var mp=MEAS.filter(function(m){return!isTO(to,"mea",m,day,shift);}).sort(function(a,b){return(msh[a]+mws[a])-(msh[b]+mws[b]);});

function aM(mea,role,prov){slot.mea[mea]={role:role,provider:prov||null};mws[mea]++;if(mwr[mea][role]!==undefined)mwr[mea][role]++;if(role==="Admin")mwa[mea]++;if(role==="Blood Draw")mwb[mea]++;mp=mp.filter(function(m){return m!==mea;});}

mp.slice().sort(function(a,b){return(mwa[a]*4+msh[a])-(mwa[b]*4+msh[b]);}).forEach(function(mea){aM(mea,"Admin");});
});});

function detect(a,ps,to,cc){

MEAS.forEach(function(mea){if(slot.mea[mea]&&slot.mea[mea].role==="Admin")mwa[mea]++;});
});});
